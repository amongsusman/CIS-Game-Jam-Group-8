<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiny & Giant: The Volcano Escape</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

  <div id="game-container">
    <div class="game-ui">
      <div class="ui-header">
        <div class="level-indicator">SECTOR <span id="lvl-num">01</span></div>
        <h1 class="game-title">TINY & GIANT</h1>
        <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button> 
        <div class="status-indicator">STATUS: <span class="blink">SYSTEMS ACTIVE</span></div>
      </div>
    </div>

    <div id="instruction-modal" class="modal-overlay">
      <div class="modal-box">
        <button id="close-modal-btn">X</button>
        <h2>MISSION BRIEFING</h2>
        <p id="instruction-text">Instructions go here...</p>
        <div class="modal-footer">PRESS ANY KEY TO DEPLOY</div>
      </div>
    </div>

    </div>

  <script src="sketch.js"></script>
</body>
</html>
